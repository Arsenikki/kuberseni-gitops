machine:
  time:
    servers:
      - time.cloudflare.com
  kernel:
    cmdline:
      - console=ttyS0
  network:
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
  sysctls:
    fs.inotify.max_user_watches: "1048576"
    fs.inotify.max_user_instances: "8192"
  kubelet:
    nodeIP:
      validSubnets:
        - 192.168.1.0/24
