# Applied to worker-02 (NAS machine)
# Mounts /dev/sdb (100GB Longhorn data disk) at /var/mnt/longhorn-data

machine:
  disks:
    - device: /dev/sdb
      partitions:
        - mountpoint: /var/mnt/longhorn-data
  kubelet:
    extraArgs:
      node-labels: node.kubernetes.io/storage-node=true,node.longhorn.io/create-default-disk=true
