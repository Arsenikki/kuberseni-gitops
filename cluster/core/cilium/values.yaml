kubeProxyReplacement: true
k8sServiceHost: "192.168.1.40"
k8sServicePort: 6443

# Control planes have VIP (192.168.1.40) as secondary IP on eth0 which confuses
# Cilium's auto-detection of the direct routing device. Must be explicit.
devices: "eth+"

l2announcements:
  enabled: true
  # Values are high due to https://github.com/cilium/cilium/issues/26586
  leaseDuration: 300s
  leaseRenewDeadline: 60s
  leaseRetryPeriod: 10s

k8sClientRateLimit:
  qps: 5
  burst: 10

hubble:
  enabled: true
  ui:
    enabled: true
  relay:
    enabled: true
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http

operator:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: "Exists"
    - key: CriticalAddonsOnly
      operator: "Exists"

# Talos-specific: cgroup v2 mounted at /sys/fs/cgroup, no auto-mount
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
