---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
  namespace: rook-ceph
spec:
  releaseName: rook-ceph
  interval: 5m
  chart:
    spec:
      chart: rook-ceph
      # renovate: registryUrl=https://charts.rook.io/release
      version: 1.15.7
      sourceRef:
        kind: HelmRepository
        name: rook-ceph-charts
        namespace: flux-system
      interval: 5m
  values:
    crds:
      enabled: true
    pspEnable: false
