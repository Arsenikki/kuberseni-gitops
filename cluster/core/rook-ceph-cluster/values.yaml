operatorNamespace: rook-ceph

cephClusterSpec:
  dataDirHostPath: /var/lib/rook
  dashboard:
    enabled: true
    ssl: false
  storage:
    useAllDevices: false
    nodes:
      - name: worker-01
        # sdb is the 500GB Ceph virtual disk; sda is the Talos OS disk — be explicit
        devices:
          - name: sdb
        config:
          deviceClass: nvme
      # worker-02: uncomment after adding HDD passthrough disks in Proxmox
      # Identify the HDD device names first with: talosctl get disks --nodes 192.168.1.45
      # - name: worker-02
      #   devices:
      #     - name: sdb   # verify device name
      #     - name: sdc   # verify device name
      #   config:
      #     deviceClass: hdd

# Fast NVMe block pool — for config PVCs
cephBlockPools:
  - name: ceph-blockpool-nvme
    spec:
      failureDomain: osd
      replicated:
        size: 1
    storageClass:
      enabled: true
      name: ceph-block
      isDefault: true
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      parameters:
        imageFormat: "2"
        imageFeatures: layering
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
        csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph

# HDD CephFS — enabled once worker-02 HDD devices are added
cephFileSystems:
  - name: ceph-filesystem-hdd
    spec:
      metadataPool:
        failureDomain: osd
        replicated:
          size: 1
      dataPools:
        - name: media-bulk
          failureDomain: osd
          replicated:
            size: 1
          deviceClass: hdd
        - name: media-replicated
          failureDomain: osd
          replicated:
            size: 2
          deviceClass: hdd
      metadataServer:
        activeCount: 1
        activeStandby: true
    storageClass:
      enabled: true
      name: ceph-filesystem
      isDefault: false
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      pool: media-bulk
      parameters:
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
        csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph

cephObjectStores: []
