---
# Cloudflare API token for cert-manager DNS01 ACME challenges
# 1Password item: "cert-manager-cloudflare" field: api_token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-token-secret
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-token-secret
    creationPolicy: Owner
  data:
    - secretKey: cloudflare-token
      remoteRef:
        key: "cert-manager-cloudflare"
        property: api_token
