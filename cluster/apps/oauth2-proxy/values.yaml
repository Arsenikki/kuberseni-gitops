image:
  repository: "quay.io/oauth2-proxy/oauth2-proxy"
  tag: "v7.8.2"

replicaCount: 1

ingress:
  enabled: true
  annotations:
    kubernetes.io/tls-acme: "true"
    external-dns/is-public: "true"
  hosts:
    - auth.arsenikki.casa
  tls:
    - hosts:
        - auth.arsenikki.casa

extraArgs:
  provider: github
  provider-display-name: "GitHub provider"
  skip-provider-button: "false"
  pass-authorization-header:
  email-domain: "*"
  cookie-domain: ".arsenikki.casa"
  whitelist-domain: ".arsenikki.casa"
  github-user: "Arsenikki"

resources:
  requests:
    cpu: "200m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# oauth2-proxy-helm-values secret must exist — created by ESO
# Contains: cookie-secret, client-id, client-secret
extraEnv:
  - name: OAUTH2_PROXY_COOKIE_SECRET
    valueFrom:
      secretKeyRef:
        name: oauth2-proxy-secrets
        key: cookie_secret
  - name: OAUTH2_PROXY_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: oauth2-proxy-secrets
        key: client_id
  - name: OAUTH2_PROXY_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: oauth2-proxy-secrets
        key: client_secret
