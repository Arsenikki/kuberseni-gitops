---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: observability
spec:
  interval: 5m
  chart:
    spec:
      chart: uptime-kuma
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 1m
  values:
    image:
      repository: louislam/uptime-kuma
      tag: 1.9.1
    env:
      TZ: "Europe/Helsinki"
    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: "traefik"
          # Set to use traefik-forward-auth middleware for authentication
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-forward-auth@kubernetescrd"
          # Set to use default cluster-issuer
          kubernetes.io/tls-acme: "true"
          # Set only "websecure" endpoint to be forwarded
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          # Set to passthrough TLS to backend service
          traefik.ingress.kubernetes.io/router.tls: "true"
        hosts:
          - host: "uptime-kuma.${SECRET_DOMAIN}"
            paths:
              - path: /
        tls:
          - secretName: uptime-kuma-tls
            hosts:
              - "uptime-kuma.${SECRET_DOMAIN}"
    persistence:
      config:
        enabled: true
        existingClaim: uptime-kuma-config
    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    resources:
      requests:
        memory: 50Mi
        cpu: 50m
      limits:
        memory: 250Mi
