---
# 1Password item: "captain-core" (in the kuberseni vault) with fields:
#   nuffield_email, nuffield_password, telegram_bot_token, telegram_chat_id,
#   gcal_client_id, gcal_client_secret, gcal_refresh_token
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: captain-core-credentials
  namespace: captain-core
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: captain-core-credentials
    creationPolicy: Owner
  data:
    - secretKey: email
      remoteRef:
        key: "captain-core"
        property: nuffield_email
    - secretKey: password
      remoteRef:
        key: "captain-core"
        property: nuffield_password
    - secretKey: telegram-bot-token
      remoteRef:
        key: "captain-core"
        property: telegram_bot_token
    - secretKey: telegram-chat-id
      remoteRef:
        key: "captain-core"
        property: telegram_chat_id
    - secretKey: gcal-client-id
      remoteRef:
        key: "captain-core"
        property: gcal_client_id
    - secretKey: gcal-client-secret
      remoteRef:
        key: "captain-core"
        property: gcal_client_secret
    - secretKey: gcal-refresh-token
      remoteRef:
        key: "captain-core"
        property: gcal_refresh_token
---
# 1Password item: "captain-core" with fields: ghcr_username, ghcr_pat
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-credentials
  namespace: captain-core
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ghcr-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"{{ .ghcr_username }}","password":"{{ .ghcr_pat }}","auth":"{{ printf \"%s:%s\" .ghcr_username .ghcr_pat | b64enc }}"}}}'
  data:
    - secretKey: ghcr_username
      remoteRef:
        key: "captain-core"
        property: ghcr_username
    - secretKey: ghcr_pat
      remoteRef:
        key: "captain-core"
        property: ghcr_pat
