---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: plex
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: plex
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: ghcr.io/k8s-at-home/plex
      tag: v1.22.3.4392-d7c624def
    env:
      TZ: "Europe/Helsinki"
    podSecurityContext:
      supplementalGroups:
        - 100
    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: "${PLEX_LB}"
      externalTrafficPolicy: Local
      port:
        port: 32400
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: "nginx"
        kubernetes.io/tls-acme: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: "plex.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: plex-cert
          hosts:
            - "plex.${SECRET_DOMAIN}"
    persistence:
      config:
        enabled: true
        existingClaim: plex-config-v1
      tmp:
        enabled: true
        emptyDir:
          enabled: true
          medium: "Memory"
    #    additionalVolumeMounts:
    #      - name: media-rocinante
    #        mountPath: "/media-rocinante"
    #        readOnly: true
    #      - name: media-serenity
    #        mountPath: "/media-serenity"
    #        readOnly: true
    #    additionalVolumes:
    #      - name: media-rocinante
    #        persistentVolumeClaim:
    #          claimName: nfs-media-rocinante-pvc
    #      - name: media-serenity
    #        persistentVolumeClaim:
    #          claimName: nfs-media-serenity-pvc
    resources:
      requests:
        gpu.intel.com/i915: 1
        cpu: 1000m
        memory: 1000Mi
      limits:
        gpu.intel.com/i915: 1
        memory: 8000Mi
