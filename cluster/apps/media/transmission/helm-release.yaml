---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: transmission
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: transmission
      version: 7.1.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: ghcr.io/k8s-at-home/transmission
      tag: v3.00
    env:
      TZ: "Europe/Helsinki"
    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: "traefik"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-forward-auth@kubernetescrd"
        hosts:
          - host: "transmission.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "transmission.${SECRET_DOMAIN}"
    persistence:
      config:
        enabled: true
        existingClaim: transmission-config
      media:
        enabled: true
        existingClaim: media-pvc
    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    resources:
      requests:
        memory: 250Mi
        cpu: 200m
      limits:
        memory: 500Mi
    addons:
      # Enable running a VPN in the pod to route traffic through a VPN
      vpn:
        enabled: true

        # VPN type: options are openvpn or wireguard
        type: wireguard

        # WireGuard specific configuration
        wireguard:
          image:
            repository: ghcr.io/k8s-at-home/wireguard
            tag: v1.0.20210424
            pullPolicy: IfNotPresent

        # Set the VPN container securityContext
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - SYS_MODULE

        # All variables specified here will be added to the vpn sidecar container
        # See the documentation of the VPN image for all config values
        env:
          TZ: "Europe/Helsinki"

        # Provide a customized vpn configuration file to be used by the VPN.
        configFile: |-
          [Interface]
          Address = 10.5.170.200
          PrivateKey = abc
          DNS = 10.0.0.243,10.0.0.242

          [Peer]
          PublicKey = def
          Endpoint = 188.126.89.39:1337
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
