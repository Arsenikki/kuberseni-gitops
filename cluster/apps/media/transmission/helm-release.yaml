---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: transmission
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: transmission
      version: 6.2.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: ghcr.io/k8s-at-home/transmission
      tag: v3.00
    env:
      TZ: "Europe/Helsinki"
    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: "traefik"
      hosts:
        - host: "transmission.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - "transmission.${SECRET_DOMAIN}"
    persistence:
      config:
        enabled: true
        existingClaim: transmission-config
      media:
        enabled: true
        existingClaim: media-pvc
    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    resources:
      requests:
        memory: 250Mi
        cpu: 200m
      limits:
        memory: 500Mi
    addons:

  # Enable running a VPN in the pod to route traffic through a VPN
  vpn:
    enabled: true

    # VPN type: options are openvpn or wireguard
    type: wireguard

    # WireGuard specific configuration
    wireguard:
      image:
        repository: k8sathome/wireguard
        pullPolicy: IfNotPresent
        tag: 1.0.20200827

    # Set the VPN container securityContext
    securityContext:
      capabilities:
        add:
          - NET_ADMIN
          - SYS_MODULE

    # All variables specified here will be added to the vpn sidecar container
    # See the documentation of the VPN image for all config values
    env:
      TZ: "Europe/Helsinki"

    # Provide a customized vpn configuration file to be used by the VPN.
    configFile:
      # |-
      # Some Example Config
      # remote greatvpnhost.com 8888
      # auth-user-pass
      # Cipher AES

    # Reference an existing secret that contains the VPN configuration file
    # The chart expects it to be present under the "vpnConfigfile" key.
    configFileSecret:

    # Provide custom up/down scripts that can be used by the vpnConf
    scripts:
      up:
      # |-
      # #!/bin/bash
      # echo "connected" > /shared/vpnstatus
      down:
      # |-
      # #!/bin/bash
      # echo "disconnected" > /shared/vpnstatus

    # Optionally specify a livenessProbe, e.g. to check if the connection is still
    # being protected by the VPN
    livenessProbe: {}
    # exec:
    #    command:
    #      - sh
    #      - -c
    #      - if [ $(curl -s https://ipinfo.io/country) == 'US' ]; then exit 0; else exit $?; fi
    #  initialDelaySeconds: 30
    #  periodSeconds: 60
    #  failureThreshold: 1

    # If set to true, will deploy a network policy that blocks all outbound
    # traffic except traffic specified as allowed
    networkPolicy:
      enabled: false

      # The egress configuration for your network policy, All outbound traffic
      # From the pod will be blocked unless specified here. Your cluster must
      # have a CNI that supports network policies (Canal, Calico, etc...)
      # https://kubernetes.io/docs/concepts/services-networking/network-policies/
      # https://github.com/ahmetb/kubernetes-network-policy-recipes
      egress:
        # - to:
        #   - ipBlock:
        #       cidr: 0.0.0.0/0
        #   ports:
        #   - port: 53
        #     protocol: UDP
        #   - port: 53
        #     protocol: TCP
