---
# YouTube API key for CastSponsorSkip
# 1Password item: "kuberseni/cast-sponsor-skip" with field: youtube_api_key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cast-sponsor-skip-secret
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cast-sponsor-skip-secret
    creationPolicy: Owner
  data:
    - secretKey: YOUTUBE_API_KEY
      remoteRef:
        key: "kuberseni/cast-sponsor-skip"
        property: youtube_api_key
