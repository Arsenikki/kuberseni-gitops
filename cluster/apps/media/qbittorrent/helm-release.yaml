---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: media
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: qbittorrent
      version: 11.3.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: ghcr.io/k8s-at-home/qbittorrent
      tag: v4.3.5
      pullPolicy: IfNotPresent
    env:
      # Our qBittorrent image has a feature that can wait for the VPN to be connected before actually starting the application.
      # It does this by checking the contents of a file /shared/vpnstatus to contain the string 'connected'.
      WAIT_FOR_VPN: "false"

    persistence:
      config:
        enabled: true
        type: emptyDir
        mountPath: /config
      # This should be enabled so that both the qBittorrent and Wireguard container have access to a shared volume mounted to /shared.
      # It will be used to communicate between the two containers.
      shared:
        enabled: true
        type: emptyDir
        mountPath: /shared
      media:
        enabled: true
        existingClaim: media-pvc

    ingress:
      main:
        enabled: true
        annotations:
          kubernetes.io/ingress.class: "traefik"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-forward-auth@kubernetescrd"
        hosts:
          - host: "qbittorrent.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - "qbittorrent.${SECRET_DOMAIN}"

    resources:
      requests:
        memory: 250Mi
        cpu: 500m
      limits:
        memory: 6000Mi

    addons:
      # Enable running a VPN in the pod to route traffic through a VPN
      vpn:
        enabled: true

        # VPN type: options are openvpn or wireguard
        type: wireguard

        # WireGuard specific configuration
        wireguard:
          image:
            repository: ghcr.io/k8s-at-home/wireguard
            tag: v1.0.20210424
            pullPolicy: IfNotPresent

        # Set the VPN container securityContext
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - SYS_MODULE

        # All variables specified here will be added to the vpn sidecar container
        # See the documentation of the VPN image for all config values
        env:
          TZ: "Europe/Helsinki"

        # Provide a customized vpn configuration file to be used by the VPN.
        configFile: |-
          [Interface]
          Address = 10.5.170.200
          PrivateKey = abc
          DNS = 10.0.0.243,10.0.0.242
          PostUp = /config/up.sh %i
          PreDown = /config/down.sh %i

          [Peer]
          PublicKey = def
          Endpoint = 188.126.89.39:1337
          AllowedIPs = 0.0.0.0/0
          PersistentKeepalive = 25
        scripts:
          up: |-
            #!/bin/bash
            echo "connected" > /shared/vpnstatus

          down: |-
            #!/bin/bash
            echo "disconnected" > /shared/vpnstatus
