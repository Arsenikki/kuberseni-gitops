---
# WireGuard VPN credentials for qbittorrent/gluetun
# 1Password item: "kuberseni/qbittorrent-vpn" with fields: wg_addresses, wg_private_key, wg_preshared_key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: qbittorrent-vpn-secret
  namespace: media
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: qbittorrent-vpn-secret
    creationPolicy: Owner
  data:
    - secretKey: WG_ADDRESSES
      remoteRef:
        key: "qbittorrent-vpn"
        property: wg_addresses
    - secretKey: WG_PRIVATE_KEY
      remoteRef:
        key: "qbittorrent-vpn"
        property: wg_private_key
    - secretKey: WG_PRESHARED_KEY
      remoteRef:
        key: "qbittorrent-vpn"
        property: wg_preshared_key
