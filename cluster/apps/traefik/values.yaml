deployment:
  kind: DaemonSet

service:
  enabled: true
  type: LoadBalancer
  annotations:
    # Transition IP — old cluster owns 192.168.1.200; update to 200 at cutover
    io.cilium/lb-ipam-ips: "192.168.1.222"
  spec:
    externalTrafficPolicy: Cluster

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true

logs:
  general:
    level: DEBUG
  access:
    enabled: true
    fields:
      headers:
        defaultmode: keep

additionalArguments:
  - "--entryPoints.websecure.forwardedHeaders.trustedIPs=10.0.0.0/8,192.168.0.0/16,173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,172.64.0.0/13,131.0.72.0/22,104.16.0.0/13,104.24.0.0/14"
  - "--metrics.prometheus=true"
  - "--entryPoints.metrics.address=:9100"
  - "--metrics.prometheus.entryPoint=metrics"

securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podSecurityContext:
  runAsUser: 568
  runAsGroup: 568
  runAsNonRoot: false
  fsGroup: 568

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: "Exists"
  - key: CriticalAddonsOnly
    operator: "Exists"

resources:
  requests:
    cpu: 10m
    memory: 100Mi
  limits:
    memory: 500Mi
