---
version: 1
metadata:
  name: &app music-assistant
entries:
  - id: provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: *app
    attrs:
      authorization_flow:
        !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      mode: forward_single
      internal_host: http://music-assistant.home-automation.svc.cluster.local:8095
      external_host: https://musicassistant.arsenikki.casa
      access_token_validity: hours=1

  - id: application
    model: authentik_core.application
    identifiers:
      slug: *app
    attrs:
      name: *app
      group: Apps
      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/music-assistant.png
      provider: !KeyOf provider
      policy_engine_mode: any
