# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
---
version: 1
metadata:
  name: update-embedded-outpost
entries:
  # Apply all app blueprints first
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: bazarr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: lidarr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: longhorn
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: nodered
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: overseerr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: prowlarr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: qbittorrent
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: radarr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: readarr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: sonarr
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: tautulli
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: zigbee2mqtt
      required: true
  - model: authentik_blueprints.metaapplyblueprint
    attrs:
      identifiers:
        name: homepage
      required: true

  # Configure the embedded outpost with all proxy providers
  - model: authentik_outposts.outpost
    state: present
    identifiers:
      name: "authentik Embedded Outpost"
    attrs:
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, "bazarr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "lidarr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "longhorn"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "nodered"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "overseerr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "prowlarr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "qbittorrent"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "radarr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "readarr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "sonarr"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "tautulli"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "zigbee2mqtt"]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, "homepage"]]
      config:
        authentik_host: https://authentik.arsenikki.casa
        kubernetes_ingress_annotations:
          kubernetes.io/tls-acme: "true"
