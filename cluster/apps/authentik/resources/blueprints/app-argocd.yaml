# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
---
version: 1
metadata:
  name: argocd
entries:
  # OAuth2 / OpenID Connect provider — ArgoCD authenticates natively against this
  # (NOT a proxy provider; NOT attached to the embedded outpost).
  - id: provider
    model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: argocd
    attrs:
      authorization_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-authorization-implicit-consent"],
        ]
      invalidation_flow:
        !Find [
          authentik_flows.flow,
          [slug, "default-provider-invalidation-flow"],
        ]
      client_type: confidential
      # Required: a blueprint-created oauth2provider defaults to grant_types: []
      # which makes Authentik reject the authorize flow with "Invalid grant_type".
      grant_types:
        - authorization_code
      client_id: !Env [ARGOCD_OIDC_CLIENT_ID, ""]
      client_secret: !Env [ARGOCD_OIDC_CLIENT_SECRET, ""]
      signing_key:
        !Find [
          authentik_crypto.certificatekeypair,
          [name, "authentik Self-signed Certificate"],
        ]
      include_claims_in_id_token: true
      access_token_validity: hours=1
      redirect_uris:
        - matching_mode: strict
          url: https://argocd.arsenikki.casa/auth/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]

  - id: application
    model: authentik_core.application
    identifiers:
      slug: argocd
    attrs:
      name: argocd
      group: Apps
      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/argo-cd.png
      provider: !KeyOf provider
      policy_engine_mode: any
