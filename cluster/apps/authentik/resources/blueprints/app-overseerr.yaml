# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
---
version: 1
metadata:
  name: &app overseerr
entries:
  - id: provider
    model: authentik_providers_proxy.proxyprovider
    identifiers:
      name: *app
    attrs:
      authorization_flow:
        !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      signing_key:
        !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      invalidation_flow:
        !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      mode: proxy
      internal_host: http://overseerr.media.svc.cluster.local:5055
      external_host: https://overseerr.homelab.arsenikki.casa
      access_token_validity: hours=1

  - id: application
    model: authentik_core.application
    identifiers:
      slug: *app
    attrs:
      name: *app
      group: Apps
      icon: https://raw.githubusercontent.com/sct/overseerr/develop/public/favicon.ico
      provider: !KeyOf provider
      policy_engine_mode: any
