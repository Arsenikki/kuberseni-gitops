apiVersion: v1
data:
  admin-user.yaml: "---\nversion: 1\nmetadata:\n  name: admin-user\nentries:\n  - id: admin-user\n    model: authentik_core.user\n    state: present\n    identifiers:\n      email: !Env [AUTHENTIK_ADMIN_EMAIL, \"\"]\n    attrs:\n      username: arseni\n      name: Arseni\n      is_superuser: true\n      groups:\n        - !Find [authentik_core.group, [name, \"authentik Admins\"]]\n"
  app-home-assistant.yaml: "---\nversion: 1\nmetadata:\n  name: &app home-assistant\nentries:\n  - id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n      name: *app\n    attrs:\n      authorization_flow:\n        !Find [authentik_flows.flow, [slug, \"default-provider-authorization-implicit-consent\"]]\n      signing_key:\n        !Find [authentik_crypto.certificatekeypair, [name, \"authentik Self-signed Certificate\"]]\n      invalidation_flow:\n        !Find [authentik_flows.flow, [slug, \"default-provider-invalidation-flow\"]]\n      mode: proxy\n      internal_host: http://home-assistant.home-automation.svc.cluster.local:8123\n      external_host: https://homeassistant.arsenikki.casa\n      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group: Apps\n      icon: https://brands.home-assistant.io/_/homeassistant/icon.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
