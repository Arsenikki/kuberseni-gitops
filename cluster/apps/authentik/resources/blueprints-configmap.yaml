---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  app-bazarr.yaml: "---\nversion: 1\nmetadata:\n  name: &app bazarr\nentries:\n  -\
    \ id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n\
    \      name: *app\n    attrs:\n      authorization_flow:\n        !Find [authentik_flows.flow,\
    \ [slug, \"default-provider-authorization-implicit-consent\"]]\n      signing_key:\n\
    \        !Find [authentik_crypto.certificatekeypair, [name, \"authentik Self-signed\
    \ Certificate\"]]\n      invalidation_flow:\n        !Find [authentik_flows.flow,\
    \ [slug, \"default-provider-invalidation-flow\"]]\n      mode: proxy\n      internal_host:\
    \ http://bazarr.media.svc.cluster.local:6767\n      external_host: https://bazarr.homelab.arsenikki.casa\n\
    \      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n\
    \    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group:\
    \ Apps\n      icon: https://raw.githubusercontent.com/morpheus65535/bazarr/master/frontend/public/images/favicon.ico\n\
    \      provider: !KeyOf provider\n      policy_engine_mode: any\n"
