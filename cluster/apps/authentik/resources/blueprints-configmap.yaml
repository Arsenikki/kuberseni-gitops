  app-tautulli.yaml: "---\nversion: 1\nmetadata:\n  name: &app tautulli\nentries:\n  - id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n      name: *app\n    attrs:\n      authorization_flow:\n        !Find [authentik_flows.flow, [slug, \"default-provider-authorization-implicit-consent\"]]\n      signing_key:\n        !Find [authentik_crypto.certificatekeypair, [name, \"authentik Self-signed Certificate\"]]\n      invalidation_flow:\n        !Find [authentik_flows.flow, [slug, \"default-provider-invalidation-flow\"]]\n      skip_path_regex: \"^/api/v2\"\n      mode: forward_single\n      internal_host: http://tautulli.media.svc.cluster.local:8181\n      external_host: https://tautulli.arsenikki.casa\n      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group: Apps\n      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/tautulli.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
  app-whoami.yaml: "---\nversion: 1\nmetadata:\n  name: &app whoami\nentries:\n  - id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n      name: *app\n    attrs:\n      authorization_flow:\n        !Find [\n          authentik_flows.flow,\n          [slug, \"default-provider-authorization-implicit-consent\"],\n        ]\n      signing_key:\n        !Find [\n          authentik_crypto.certificatekeypair,\n          [name, \"authentik Self-signed Certificate\"],\n        ]\n      invalidation_flow:\n        !Find [\n          authentik_flows.flow,\n          [slug, \"default-provider-invalidation-flow\"],\n        ]\n      mode: forward_single\n      internal_host: http://whoami.authentik.svc.cluster.local:80\n      external_host: https://whoami.arsenikki.casa\n      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group: Apps\n      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/whats-up-docker.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
  app-zigbee2mqtt.yaml: "---\nversion: 1\nmetadata:\n  name: &app zigbee2mqtt\nentries:\n  - id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n      name: *app\n    attrs:\n      authorization_flow:\n        !Find [\n          authentik_flows.flow,\n          [slug, \"default-provider-authorization-implicit-consent\"],\n        ]\n      signing_key:\n        !Find [\n          authentik_crypto.certificatekeypair,\n          [name, \"authentik Self-signed Certificate\"],\n        ]\n      invalidation_flow:\n        !Find [\n          authentik_flows.flow,\n          [slug, \"default-provider-invalidation-flow\"],\n        ]\n      mode: forward_single\n      internal_host: http://zigbee2mqtt.home-automation.svc.cluster.local:8080\n      external_host: https://zigbee.arsenikki.casa\n      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group: Apps\n      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/zigbee2mqtt.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
  embedded-outpost.yaml: "---\nversion: 1\nmetadata:\n  name: update-embedded-outpost\nentries:\n  # Apply all app blueprints first\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: bazarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: lidarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: longhorn\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: nodered\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: overseerr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: prowlarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: qbittorrent\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: radarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: readarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: sonarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: tautulli\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: zigbee2mqtt\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n        name: homepage\n      required: true\n\n  # Configure the embedded outpost with all proxy providers\n  - model: authentik_outposts.outpost\n    state: present\n    identifiers:\n      name: \"authentik Embedded Outpost\"\n    attrs:\n      providers:\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"bazarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"lidarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"longhorn\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"nodered\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"overseerr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"prowlarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"qbittorrent\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"radarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"readarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"sonarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"tautulli\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"zigbee2mqtt\"]]\n        - !Find [authentik_providers_proxy.proxyprovider, [name, \"homepage\"]]\n      config:\n        authentik_host: https://authentik.arsenikki.casa\n        kubernetes_ingress_annotations:\n          kubernetes.io/tls-acme: \"true\"\n"
  app-argocd.yaml: "---\nversion: 1\nmetadata:\n  name: argocd\nentries:\n  - id: provider\n    model: authentik_providers_oauth2.oauth2provider\n    identifiers:\n      name: argocd\n    attrs:\n      authorization_flow: !Find [authentik_flows.flow, [slug, \"default-provider-authorization-implicit-consent\"]]\n      invalidation_flow: !Find [authentik_flows.flow, [slug, \"default-provider-invalidation-flow\"]]\n      client_type: confidential\n      client_id: !Env [ARGOCD_OIDC_CLIENT_ID, \"\"]\n      client_secret: !Env [ARGOCD_OIDC_CLIENT_SECRET, \"\"]\n      signing_key: !Find [authentik_crypto.certificatekeypair, [name, \"authentik Self-signed Certificate\"]]\n      include_claims_in_id_token: true\n      access_token_validity: hours=1\n      redirect_uris:\n        - matching_mode: strict\n          url: https://argocd.arsenikki.casa/auth/callback\n      property_mappings:\n        - !Find [authentik_providers_oauth2.scopemapping, [managed, \"goauthentik.io/providers/oauth2/scope-openid\"]]\n        - !Find [authentik_providers_oauth2.scopemapping, [managed, \"goauthentik.io/providers/oauth2/scope-email\"]]\n        - !Find [authentik_providers_oauth2.scopemapping, [managed, \"goauthentik.io/providers/oauth2/scope-profile\"]]\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: argocd\n    attrs:\n      name: argocd\n      group: Apps\n      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/argo-cd.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
  app-homepage.yaml: "---\nversion: 1\nmetadata:\n  name: &app homepage\nentries:\n  - id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n      name: *app\n    attrs:\n      authorization_flow:\n        !Find [authentik_flows.flow, [slug, \"default-provider-authorization-implicit-consent\"]]\n      signing_key:\n        !Find [authentik_crypto.certificatekeypair, [name, \"authentik Self-signed Certificate\"]]\n      invalidation_flow:\n        !Find [authentik_flows.flow, [slug, \"default-provider-invalidation-flow\"]]\n      mode: forward_single\n      internal_host: http://homepage.default.svc.cluster.local:3000\n      external_host: https://home.arsenikki.casa\n      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group: Apps\n      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/homepage.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
  source-github.yaml: "---\nversion: 1\nmetadata:\n  name: source-github\nentries:\n  - id: github-source\n    model: authentik_sources_oauth.oauthsource\n    identifiers:\n      slug: github\n    attrs:\n      name: GitHub\n      provider_type: github\n      consumer_key: !Env [GITHUB_OAUTH_CLIENT_ID, \"\"]\n      consumer_secret: !Env [GITHUB_OAUTH_CLIENT_SECRET, \"\"]\n      authentication_flow: !Find [authentik_flows.flow, [slug, \"default-source-authentication\"]]\n      enrollment_flow: !Find [authentik_flows.flow, [slug, \"default-source-enrollment\"]]\n      enabled: true\n      user_matching_mode: email_link\n\n  - model: authentik_stages_identification.identificationstage\n    identifiers:\n      name: default-authentication-identification\n    attrs:\n      sources:\n        - !KeyOf github-source\n      show_source_labels: true\n"
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
