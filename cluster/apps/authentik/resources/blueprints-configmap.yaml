  app-radarr.yaml: "---\nversion: 1\nmetadata:\n  name: &app radarr\nentries:\n  - id: provider\n    model: authentik_providers_proxy.proxyprovider\n    identifiers:\n      name: *app\n    attrs:\n      basic_auth_enabled: true\n      basic_auth_user_attribute: radarr_user\n      basic_auth_password_attribute: radarr_password\n      authorization_flow:\n        !Find [\n          authentik_flows.flow,\n          [slug, \"default-provider-authorization-implicit-consent\"],\n        ]\n      signing_key:\n        !Find [\n          authentik_crypto.certificatekeypair,\n          [name, \"authentik Self-signed Certificate\"],\n        ]\n      invalidation_flow:\n        !Find [\n          authentik_flows.flow,\n          [slug, \"default-provider-invalidation-flow\"],\n        ]\n      skip_path_regex: \"^/api|^/feed|^/ping\"\n      mode: forward_single\n      internal_host: http://radarr.media.svc.cluster.local:7878\n      external_host: https://radarr.arsenikki.casa\n      access_token_validity: hours=1\n\n  - id: application\n    model: authentik_core.application\n    identifiers:\n      slug: *app\n    attrs:\n      name: *app\n      group: Apps\n      icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/radarr.png\n      provider: !KeyOf provider\n      policy_engine_mode: any\n"
