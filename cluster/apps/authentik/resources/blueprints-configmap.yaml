  embedded-outpost.yaml: "---\nversion: 1\nmetadata:\n  name: update-embedded-outpost\n\
    entries:\n  # Apply all app blueprints first\n  - model: authentik_blueprints.metaapplyblueprint\n\
    \    attrs:\n      identifiers:\n        name: bazarr\n      required: true\n\
    \  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n\
    \        name: home-assistant\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n\
    \    attrs:\n      identifiers:\n        name: lidarr\n      required: true\n\
    \  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n\
    \        name: nodered\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n\
    \    attrs:\n      identifiers:\n        name: overseerr\n      required: true\n\
    \  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n\
    \        name: prowlarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n\
    \    attrs:\n      identifiers:\n        name: qbittorrent\n      required: true\n\
    \  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n\
    \        name: radarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n\
    \    attrs:\n      identifiers:\n        name: readarr\n      required: true\n\
    \  - model: authentik_blueprints.metaapplyblueprint\n    attrs:\n      identifiers:\n\
    \        name: sonarr\n      required: true\n  - model: authentik_blueprints.metaapplyblueprint\n\
    \    attrs:\n      identifiers:\n        name: zigbee2mqtt\n      required: true\n\
    \n  # Configure the embedded outpost with all proxy providers\n  - model: authentik_outposts.outpost\n\
    \    state: present\n    identifiers:\n      name: \"authentik Embedded Outpost\"\
    \n    attrs:\n      providers:\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"bazarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"home-assistant\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"lidarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"nodered\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"overseerr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"prowlarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"qbittorrent\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"radarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"readarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"sonarr\"]]\n        - !Find [authentik_providers_proxy.proxyprovider,\
    \ [name, \"zigbee2mqtt\"]]\n      config:\n        authentik_host: https://authentik.homelab.arsenikki.casa\n\
    \        kubernetes_ingress_annotations:\n          kubernetes.io/tls-acme: \"\
    true\"\n"
