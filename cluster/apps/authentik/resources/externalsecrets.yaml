---
# Authentik credentials — pulled from 1Password vault "kuberseni"
# Item: "authentik" with fields: bootstrap_token, bootstrap_password, secret_key, postgres_password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    - secretKey: AUTHENTIK_BOOTSTRAP_TOKEN
      remoteRef:
        key: "authentik"
        property: bootstrap_token
    - secretKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      remoteRef:
        key: "authentik"
        property: bootstrap_password
    - secretKey: AUTHENTIK_SECRET_KEY
      remoteRef:
        key: "authentik"
        property: secret_key
    - secretKey: AUTHENTIK_POSTGRES_PASSWORD
      remoteRef:
        key: "authentik"
        property: postgres_password
    - secretKey: AUTHENTIK_POSTGRESQL__PASSWORD
      remoteRef:
        key: "authentik"
        property: postgres_password
    - secretKey: GITHUB_OAUTH_CLIENT_ID
      remoteRef:
        key: "authentik"
        property: github_client_id
    - secretKey: GITHUB_OAUTH_CLIENT_SECRET
      remoteRef:
        key: "authentik"
        property: github_client_secret
