---
# API keys for homepage service widgets.
# 1Password item: "homepage-secrets" (vault: homelab)
# Keys are prefixed HOMEPAGE_VAR_ so Homepage v1 can inject them via
# {{HOMEPAGE_VAR_*}} template syntax in services.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-secrets
    creationPolicy: Owner
  data:
    - secretKey: HOMEPAGE_VAR_PLEX_TOKEN
      remoteRef:
        key: "homepage-secrets"
        property: plex_token
    - secretKey: HOMEPAGE_VAR_SONARR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: sonarr_api_key
    - secretKey: HOMEPAGE_VAR_RADARR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: radarr_api_key
    - secretKey: HOMEPAGE_VAR_LIDARR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: lidarr_api_key
    - secretKey: HOMEPAGE_VAR_READARR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: readarr_api_key
    - secretKey: HOMEPAGE_VAR_BAZARR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: bazarr_api_key
    - secretKey: HOMEPAGE_VAR_PROWLARR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: prowlarr_api_key
    - secretKey: HOMEPAGE_VAR_OVERSEERR_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: overseerr_api_key
    - secretKey: HOMEPAGE_VAR_TAUTULLI_API_KEY
      remoteRef:
        key: "homepage-secrets"
        property: tautulli_api_key
