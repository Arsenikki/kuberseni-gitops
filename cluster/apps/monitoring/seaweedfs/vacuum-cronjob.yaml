---
# Daily SeaweedFS volume vacuum to reclaim garbage from deleted S3 objects.
#
# Why: SeaweedFS's default garbage threshold is 0.3 (30%), meaning it only
# compacts volumes when 30%+ of their data is deleted. In practice Mimir
# compaction produces 17–27% garbage, which never triggers auto-vacuum.
# Left unchecked, deleted-but-not-reclaimed data fills the Longhorn PVC and
# the underlying LVM-thin pool. Running with a lower threshold daily keeps
# garbage close to zero.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seaweedfs-vacuum
  namespace: monitoring
spec:
  schedule: "0 4 * * *" # daily at 04:00
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: vacuum
              image: chrislusf/seaweedfs:latest
              command:
                - sh
                - -c
                - |
                  printf "lock\nvolume.vacuum -garbageThreshold=0.1\n" \
                    | weed shell \
                        -master=seaweedfs-master:9333 \
                        -filer=seaweedfs-filer:8888
