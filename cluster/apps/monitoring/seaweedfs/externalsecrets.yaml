---
# S3 credentials for the observability object store.
# 1Password item: "seaweedfs-s3" (homelab vault) with fields: access_key, secret_key.
#
# Two secrets from the same item:
#   1. seaweedfs-s3-config  — SeaweedFS S3 identity JSON (consumed by the s3 gateway)
#   2. seaweedfs-s3         — raw keys as env vars (consumed by Mimir + Loki)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: seaweedfs-s3-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        seaweedfs_s3_config: |
          {"identities":[{"name":"monitoring","credentials":[{"accessKey":"{{ .access_key }}","secretKey":"{{ .secret_key }}"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
  data:
    - secretKey: access_key
      remoteRef:
        key: "seaweedfs-s3"
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: "seaweedfs-s3"
        property: secret_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: seaweedfs-s3
    creationPolicy: Owner
  data:
    # Mimir reads these via -config.expand-env (${S3_ACCESS_KEY} / ${S3_SECRET_KEY}).
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: "seaweedfs-s3"
        property: access_key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: "seaweedfs-s3"
        property: secret_key
    # Loki leaves its S3 creds unset and picks these up via the AWS SDK env chain.
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: "seaweedfs-s3"
        property: access_key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: "seaweedfs-s3"
        property: secret_key
