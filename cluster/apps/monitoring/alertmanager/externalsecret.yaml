---
# Standalone upstream Prometheus Alertmanager config, rendered by ESO into a Secret.
# We run upstream prom/alertmanager (NOT Mimir's bundled AM) because Mimir vendors
# Grafana's alertmanager fork, which has NO `message_thread_id` field — so it cannot
# post to a Telegram forum Topic and CrashLoops if you try. Upstream v0.27+ supports
# message_thread_id, so alerts land in the dedicated Topic.
#
# Routing is authored here (reviewable in git, not sensitive); the bot token, chat id
# and topic id come from 1Password so they never land in this PUBLIC repo.
#
# 1Password item "CasaBot (Telegram)" properties:
#   credential      — alert bot token (@CasaAlertingBot — separate from the agent bot)
#   chat_id         — Casa Automation supergroup id (-100…)
#   topic_alerts_id — forum Topic (message_thread_id) alerts post into (the "Alerts"
#                     topic; topic_debug_id is a different topic, kept for other use)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      data:
        alertmanager.yml: |
          # `['...']` = group by ALL labels → effectively NO aggregation, so each
          # distinct alert is its own Telegram message. Lets you reply to one specific
          # alert and @mention the agent to investigate just that one. Fine at homelab
          # alert volume.
          templates:
            - /etc/alertmanager-templates/*.tmpl
          route:
            receiver: telegram
            group_by: ['...']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
          receivers:
            - name: telegram
              telegram_configs:
                - api_url: https://api.telegram.org
                  bot_token: '{{ .token }}'
                  chat_id: {{ .chat_id }}
                  message_thread_id: {{ .topic }}
                  parse_mode: HTML
                  send_resolved: true
                  # Custom emoji template (see alertmanager-templates ConfigMap). The
                  # braces are escaped so ESO emits them literally for Alertmanager to
                  # evaluate at notify time, instead of consuming them at render time.
                  message: '{{ "{{" }} template "telegram.casa.message" . {{ "}}" }}'
  data:
    - secretKey: token
      remoteRef:
        key: "CasaBot (Telegram)"
        property: credential
    - secretKey: chat_id
      remoteRef:
        key: "CasaBot (Telegram)"
        property: chat_id
    - secretKey: topic
      remoteRef:
        key: "CasaBot (Telegram)"
        property: topic_alerts_id
