---
# Grafana Tempo — monolithic single-binary on SeaweedFS S3. Homelab footprint:
# 1 replica, 24h retention, OTLP receivers only. Mirrors the Loki/Mimir pattern.

replicas: 1

# Run as the chart's default non-root uid; fsGroup lets it own the Longhorn PVC.
securityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  runAsNonRoot: true

tempo:
  retention: 24h

  # S3 creds are injected as ${S3_ACCESS_KEY}/${S3_SECRET_KEY}; expand-env resolves
  # them in the rendered config (same seaweedfs-s3 secret Mimir/Loki use).
  extraArgs:
    config.expand-env: "true"
  extraEnvFrom:
    - secretRef:
        name: seaweedfs-s3

  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-data
        endpoint: seaweedfs-s3.monitoring.svc.cluster.local:8333
        access_key: "${S3_ACCESS_KEY}"
        secret_key: "${S3_SECRET_KEY}"
        insecure: true
        forcepathstyle: true
      wal:
        path: /var/tempo/wal

  # Only OTLP in — traces arrive from Alloy (telemetry-infra ticket wires the export).
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

# WAL + unflushed blocks survive restarts on a small Longhorn PVC (blocks live in S3).
persistence:
  enabled: true
  size: 10Gi
  storageClassName: longhorn
