---
# Grafana — Mimir + Loki datasources, Authentik OIDC SSO, dashboards-as-code.

# worker-02 (Celeron N5105, NAS host) has a corrupted containerd layer for this image
# (bash binary is 0 bytes, causing exec /run.sh: exec format error). worker-01 (i5-13500H)
# is also the better host: 10 CPU / 20 GB vs 3 CPU / 16 GB.
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-01

persistence:
  enabled: true
  size: 2Gi
  storageClassName: longhorn

# RWO PVC + RollingUpdate deadlocks (new pod can't mount while old holds it) → Recreate.
deploymentStrategy:
  type: Recreate

# Break-glass admin secret is auto-generated by the chart (secret "grafana").
# Normal login is via Authentik SSO below.

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns/is-public: "true"
  hosts:
    - grafana.arsenikki.casa
  tls:
    - hosts:
        - grafana.arsenikki.casa
      secretName: grafana-tls

# OAuth client id/secret from 1Password via ESO (see externalsecret-oauth.yaml).
# GF_* env vars override the corresponding grafana.ini keys.
envValueFrom:
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
    secretKeyRef:
      name: grafana-oauth
      key: client_id
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oauth
      key: client_secret

grafana.ini:
  server:
    root_url: https://grafana.arsenikki.casa
  auth:
    oauth_auto_login: false
  auth.generic_oauth:
    enabled: true
    name: Authentik
    scopes: "openid profile email groups"
    auth_url: https://authentik.arsenikki.casa/application/o/authorize/
    token_url: https://authentik.arsenikki.casa/application/o/token/
    api_url: https://authentik.arsenikki.casa/application/o/userinfo/
    # Map Authentik groups → Grafana roles.
    role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
    allow_assign_grafana_admin: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
        isDefault: true
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "homelab"
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "homelab"

# Community dashboards downloaded from grafana.com at pod startup via init container.
# Each folder key maps to /var/lib/grafana/dashboards/{folder}/ and needs a matching
# dashboardProviders entry below.
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/kubernetes
      - name: proxmox
        orgId: 1
        folder: Proxmox
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/proxmox

dashboards:
  kubernetes:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Mimir
    kubernetes-global:
      gnetId: 15757
      revision: 37
      datasource: Mimir
    kubernetes-namespaces:
      gnetId: 15758
      revision: 34
      datasource: Mimir
    kubernetes-nodes:
      gnetId: 15759
      revision: 29
      datasource: Mimir
    kubernetes-pods:
      gnetId: 15760
      revision: 29
      datasource: Mimir
  proxmox:
    # pve-exporter scrapes Proxmox API → exposes host (node/*) AND VM (qemu/*) metrics.
    # Filters id=~"node/.*" show physical host CPU/mem/disk (router/minipc/nas),
    # not just the k8s VM nodes that node-exporter already covers.
    pve-overview:
      gnetId: 10347
      datasource: Mimir

# Dashboards-as-code: the sidecar loads any ConfigMap labeled grafana_dashboard.
# Coexists with the gnetId download mechanism above.
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: monitoring
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: false # provisioned inline above
