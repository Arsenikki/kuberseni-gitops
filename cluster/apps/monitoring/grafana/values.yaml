---
# Grafana — Mimir + Loki datasources, Authentik OIDC SSO, dashboards-as-code.

persistence:
  enabled: true
  size: 2Gi
  storageClassName: longhorn

# Break-glass admin secret is auto-generated by the chart (secret "grafana").
# Normal login is via Authentik SSO below.

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns/is-public: "true"
  hosts:
    - grafana.arsenikki.casa
  tls:
    - hosts:
        - grafana.arsenikki.casa
      secretName: grafana-tls

# OAuth client id/secret from 1Password via ESO (see externalsecret-oauth.yaml).
# GF_* env vars override the corresponding grafana.ini keys.
envValueFrom:
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
    secretKeyRef:
      name: grafana-oauth
      key: client_id
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-oauth
      key: client_secret

grafana.ini:
  server:
    root_url: https://grafana.arsenikki.casa
  auth:
    oauth_auto_login: false
  auth.generic_oauth:
    enabled: true
    name: Authentik
    scopes: "openid profile email"
    auth_url: https://authentik.arsenikki.casa/application/o/authorize/
    token_url: https://authentik.arsenikki.casa/application/o/token/
    api_url: https://authentik.arsenikki.casa/application/o/userinfo/
    # Map Authentik groups → Grafana roles.
    role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
    allow_assign_grafana_admin: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-gateway.monitoring.svc.cluster.local/prometheus
        isDefault: true
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "homelab"
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        jsonData:
          httpHeaderName1: "X-Scope-OrgID"
        secureJsonData:
          httpHeaderValue1: "homelab"

# Dashboards-as-code: the sidecar loads any ConfigMap labeled grafana_dashboard
# (see observability/ for the imported community dashboards).
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: monitoring
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
  datasources:
    enabled: false # provisioned inline above
