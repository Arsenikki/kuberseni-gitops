---
# Jeeves / Claude Code native OTLP usage dashboard (dashboards-as-code).
# The grafana chart's sidecar auto-loads any ConfigMap labeled grafana_dashboard;
# grafana_folder places it in the "Jeeves" folder. Synced into the monitoring
# namespace by the grafana ArgoCD app's directory source.
#
# NOTE: queries use the documented claude_code.* OTLP metric/attribute names
# (not OpenLIT gen_ai_*). Tempo panels + metric->trace correlations depend on the
# Tempo datasource and the telemetry-infra / Jeeves-exporter tickets landing;
# reconcile names against a real test export before trusting absolute values.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jeeves
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Jeeves
data:
  jeeves-usage.json: |-
    {
      "uid": "jeeves-usage",
      "title": "Jeeves — Model Usage & Cost",
      "tags": [
        "jeeves",
        "claude-code",
        "otlp"
      ],
      "timezone": "browser",
      "editable": true,
      "schemaVersion": 39,
      "refresh": "5m",
      "time": {
        "from": "now-7d",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "environment",
            "label": "Environment",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "mimir"
            },
            "query": {
              "query": "label_values(claude_code_session_count_total, environment)",
              "refId": "environment-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          },
          {
            "name": "model",
            "label": "Model",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "mimir"
            },
            "query": {
              "query": "label_values(claude_code_token_usage_tokens_total, model)",
              "refId": "model-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          },
          {
            "name": "query_source",
            "label": "Query source",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "mimir"
            },
            "query": {
              "query": "label_values(claude_code_token_usage_tokens_total, query_source)",
              "refId": "query_source-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          },
          {
            "name": "effort",
            "label": "Effort",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "mimir"
            },
            "query": {
              "query": "label_values(claude_code_token_usage_tokens_total, effort)",
              "refId": "effort-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          },
          {
            "name": "skill",
            "label": "Skill",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "mimir"
            },
            "query": {
              "query": "label_values(claude_code_token_usage_tokens_total, skill)",
              "refId": "skill-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          },
          {
            "name": "mcp_server",
            "label": "MCP server",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": {
              "query": "label_values(mcp_server)",
              "refId": "mcp_server-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          },
          {
            "name": "mcp_tool",
            "label": "MCP tool",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": {
              "query": "label_values(mcp_tool)",
              "refId": "mcp_tool-var"
            },
            "refresh": 2,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "options": [],
            "sort": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "About this dashboard",
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "**Jeeves / Claude Code native OTLP usage.** Metrics come from Mimir (`claude_code.*`), events from Loki, traces from Tempo.\n\n⚠️ **Cost is an operational estimate**, computed by Claude Code from token counts — it is **not** the Anthropic invoice; use it for relative trends, not billing.\n\nMetric names follow the documented `claude_code.*` OTLP names mapped to Prometheus (dots→`_`, unit + `_total` suffixes). Reconcile against a real test export before relying on absolute values. No session/user/agent/ticket IDs are used as labels."
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Est. cost (USD)",
          "datasource": {
            "type": "prometheus",
            "uid": "mimir"
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "prometheus",
                "uid": "mimir"
              },
              "expr": "sum(increase(claude_code_cost_usage_USD_total{environment=~\"$environment\",model=~\"$model\",query_source=~\"$query_source\",effort=~\"$effort\",skill=~\"$skill\"}[$__range]))"
