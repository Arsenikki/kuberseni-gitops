---
# Grafana <-> Authentik OIDC client credentials.
# 1Password item: "grafana" (homelab vault) with fields: oauth_client_id, oauth_client_secret.
# Create an OAuth2/OIDC provider + application for Grafana in Authentik first
# (redirect URI: https://grafana.arsenikki.casa/login/generic_oauth), then store its
# client id/secret in 1Password under these fields.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grafana-oauth
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: "grafana"
        property: oauth_client_id
    - secretKey: client_secret
      remoteRef:
        key: "grafana"
        property: oauth_client_secret
