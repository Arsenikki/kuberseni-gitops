---
# Full Mimir Alertmanager config, rendered by ESO into a Secret.
# The ROUTING is authored here (reviewable in git, not sensitive); the bot token
# and the group/topic IDs are interpolated from 1Password so they never land in
# this PUBLIC repo. Mounted and used via `-alertmanager.configs.fallback` (see
# mimir/values.yaml). Alertmanager's telegram_configs has no *_file for chat_id,
# so the whole config must be secret-sourced to keep the IDs out of git.
#
# 1Password item "CasaBot (Telegram)" properties:
#   credential      — bot token (existing)
#   chat_id         — Casa Automation supergroup id (e.g. -100…)
#   topic_debug_id  — forum Topic (message_thread_id) for alerts
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mimir-alertmanager-config
    creationPolicy: Owner
    template:
      data:
        alertmanager.yaml: |
          route:
            receiver: telegram
            group_by: ['alertname', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              # warning/critical → BOTH telegram (CasaBot) AND claudtainer.
              # A matched child route suppresses the parent receiver, and `continue`
              # only advances to SIBLING routes (never back to the parent) — so
              # telegram must be its own child route here to still fire for these.
              - receiver: telegram
                matchers:
                  - severity =~ "warning|critical"
                continue: true
              - receiver: claudtainer
                matchers:
                  - severity =~ "warning|critical"
                # Don't re-trigger an investigation for the same firing alert every 4h.
                repeat_interval: 24h
              # Anything else (info / no severity) falls through to the parent
              # telegram receiver above.
          receivers:
            - name: telegram
              telegram_configs:
                - bot_token: '{{ .token }}'
                  chat_id: {{ .chat_id }}
                  message_thread_id: {{ .topic }}
                  parse_mode: HTML
                  send_resolved: true
            - name: claudtainer
              webhook_configs:
                - url: http://claudtainer-gateway.claudtainer.svc.cluster.local:8080/alertmanager/webhook
                  send_resolved: false
  data:
    - secretKey: token
      remoteRef:
        key: "CasaBot (Telegram)"
        property: credential
    - secretKey: chat_id
      remoteRef:
        key: "CasaBot (Telegram)"
        property: chat_id
    - secretKey: topic
      remoteRef:
        key: "CasaBot (Telegram)"
        property: topic_debug_id
