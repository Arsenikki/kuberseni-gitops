---
# Telegram bot token for Mimir Alertmanager → reuses the existing CasaBot bot.
# 1Password item: "CasaBot (Telegram)" property: credential (same as ArgoCD/k8s-event-exporter).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-alertmanager-telegram
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mimir-alertmanager-telegram
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: "CasaBot (Telegram)"
        property: credential
