---
# Full Mimir Alertmanager config, rendered by ESO into a Secret.
# The ROUTING is authored here (reviewable in git, not sensitive); the bot token
# and the group/topic IDs are interpolated from 1Password so they never land in
# this PUBLIC repo. Mounted and used via `-alertmanager.configs.fallback` (see
# mimir/values.yaml). Alertmanager's telegram_configs has no *_file for chat_id,
# so the whole config must be secret-sourced to keep the IDs out of git.
#
# 1Password item "CasaBot (Telegram)" properties:
#   credential   — bot token (existing)
#   chat_id      — Casa Automation supergroup id (e.g. -100…)
#   topic_debug  — forum Topic (message_thread_id) for alerts
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mimir-alertmanager-config
    creationPolicy: Owner
    template:
      data:
        alertmanager.yaml: |
          route:
            receiver: telegram
            group_by: ['alertname', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              # Fan warning/critical alerts to claudtainer (auto-investigates +
              # reports back). continue:true keeps the CasaBot notification.
              - receiver: claudtainer
                continue: true
                matchers:
                  - severity =~ "warning|critical"
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 4h
          receivers:
            - name: telegram
              telegram_configs:
                - bot_token: '{{ .token }}'
                  chat_id: {{ .chat_id }}
                  message_thread_id: {{ .topic }}
                  parse_mode: HTML
                  send_resolved: true
            - name: claudtainer
              webhook_configs:
                - url: http://claudtainer-gateway.claudtainer.svc.cluster.local:8080/alertmanager/webhook
                  send_resolved: false
  data:
    - secretKey: token
      remoteRef:
        key: "CasaBot (Telegram)"
        property: credential
    - secretKey: chat_id
      remoteRef:
        key: "CasaBot (Telegram)"
        property: chat_id
    - secretKey: topic
      remoteRef:
        key: "CasaBot (Telegram)"
        property: topic_debug
