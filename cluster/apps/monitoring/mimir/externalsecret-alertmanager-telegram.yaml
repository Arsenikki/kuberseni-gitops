---
# Full Mimir Alertmanager config, rendered by ESO into a Secret.
# The ROUTING is authored here (reviewable in git, not sensitive); the bot token
# and chat id are interpolated from 1Password so they never land in this PUBLIC
# repo. Mounted and used via `-alertmanager.configs.fallback` (see mimir/values.yaml).
# Alertmanager's telegram_configs has no *_file for chat_id, so the whole config
# must be secret-sourced to keep the id out of git.
#
# NOTE — no `message_thread_id`: Mimir's bundled Alertmanager (classic mode, v3.0.x)
# has no such field in its telegram config struct. Adding it makes the AM fail to
# load this fallback config ("field message_thread_id not found in type config.plain")
# and CrashLoop. So alerts post to the group's General topic, not a forum Topic.
# (Targeting a Topic would require a Mimir release whose vendored Alertmanager
# supports message_thread_id.)
#
# Auto-triggering claudtainer investigations from alerts was removed deliberately:
# the user prefers to REPLY to an alert and @mention the agent bot to investigate,
# rather than fire an investigation for every alert. (The gateway still exposes
# /alertmanager/webhook; it is simply no longer wired as a receiver here.)
#
# 1Password item "CasaBot (Telegram)" properties:
#   credential — alert bot token (separate bot from the agent @CasaAgenticBot)
#   chat_id    — Casa Automation supergroup id (e.g. -100…)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mimir-alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: mimir-alertmanager-config
    creationPolicy: Owner
    template:
      data:
        alertmanager.yaml: |
          route:
            receiver: telegram
            group_by: ['alertname', 'namespace']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
          receivers:
            - name: telegram
              telegram_configs:
                - bot_token: '{{ .token }}'
                  chat_id: {{ .chat_id }}
                  parse_mode: HTML
                  send_resolved: true
  data:
    - secretKey: token
      remoteRef:
        key: "CasaBot (Telegram)"
        property: credential
    - secretKey: chat_id
      remoteRef:
        key: "CasaBot (Telegram)"
        property: chat_id
