---
installCRDs: true

extraArgs:
  - --dns01-recursive-nameservers=1.1.1.1:53
  - --dns01-recursive-nameservers-only

podDnsPolicy: "None"
podDnsConfig:
  nameservers:
    - "1.1.1.1"
    - "8.8.8.8"

ingressShim:
  defaultIssuerName: "letsencrypt-prod"
  defaultIssuerKind: "ClusterIssuer"
  defaultIssuerGroup: "cert-manager.io"
