---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-event-exporter-config
  namespace: home-automation
data:
  config.yaml: |
    logLevel: error
    logFormat: json
    maxEventAgeSeconds: 10
    route:
      routes:
        - match:
            - type: Warning
              reason: "BackOff|OOMKilling|Failed|FailedMount|FailedScheduling|Evicted|NodeNotReady|Killing"
          drop:
            - namespace: kube-system
            - namespace: kube-node-lease
          sink:
            - ref: telegram
    sinks:
      - name: telegram
        webhook:
          endpoint: https://api.telegram.org/botTELEGRAM_TOKEN_PLACEHOLDER/sendMessage
          headers:
            Content-Type: application/json
          layout:
            chat_id: "128627881"
            text: "⚠️ {{.Reason}}: {{.InvolvedObject.Namespace}}/{{.InvolvedObject.Name}}\n{{.Message}}"
