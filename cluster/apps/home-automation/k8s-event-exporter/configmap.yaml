---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-event-exporter-config
  namespace: home-automation
data:
  config.yaml: |
    logLevel: error
    logFormat: json
    maxEventAgeSeconds: 10
    route:
      routes:
        - match:
            - type: Warning
              reason:
                - BackOff
                - OOMKilling
                - Failed
                - FailedMount
                - FailedScheduling
                - Evicted
                - NodeNotReady
                - Killing
          drop:
            - namespace: kube-system
            - namespace: kube-node-lease
          sink:
            - ref: ntfy
    sinks:
      - name: ntfy
        webhook:
          endpoint: http://ntfy.home-automation.svc.cluster.local
          headers:
            Content-Type: application/json
          layout:
            topic: k8s-events
            title: "{{.Reason}}: {{.InvolvedObject.Namespace}}/{{.InvolvedObject.Name}}"
            message: "{{.Message}}"
            priority: 3
            tags:
              - warning
