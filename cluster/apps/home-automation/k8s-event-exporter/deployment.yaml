---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-event-exporter
  namespace: home-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-event-exporter
  template:
    metadata:
      labels:
        app: k8s-event-exporter
    spec:
      serviceAccountName: k8s-event-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: config-renderer
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - "sed 's|TELEGRAM_TOKEN_PLACEHOLDER|'\"$TELEGRAM_BOT_TOKEN\"'|g' /etc/event-exporter/config.yaml > /etc/event-exporter-rendered/config.yaml"
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: casabot-credentials
                  key: TELEGRAM_BOT_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/event-exporter
              readOnly: true
            - name: config-rendered
              mountPath: /etc/event-exporter-rendered
      containers:
        - name: k8s-event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          args:
            - -conf=/etc/event-exporter-rendered/config.yaml
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/event-exporter-rendered
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: k8s-event-exporter-config
        - name: config-rendered
          emptyDir: {}
