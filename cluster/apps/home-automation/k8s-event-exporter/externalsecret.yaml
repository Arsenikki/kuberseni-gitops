---
# ESO templates the config.yaml with the bot token embedded.
# k8s-event-exporter Go template vars ({{.Reason}} etc.) are escaped
# as {{ "{{" }}.Field{{ "}}" }} so ESO's engine leaves them intact.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: k8s-event-exporter-config
  namespace: home-automation
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: k8s-event-exporter-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.yaml: |
          logLevel: error
          logFormat: json
          maxEventAgeSeconds: 10
          route:
            routes:
              - match:
                  - type: Warning
                    reason: "BackOff|OOMKilling|Failed|FailedMount|FailedScheduling|Evicted|NodeNotReady|Killing"
                drop:
                  - namespace: kube-system
                  - namespace: kube-node-lease
                sink:
                  - ref: telegram
          sinks:
            - name: telegram
              webhook:
                endpoint: "https://api.telegram.org/bot{{ .telegramToken }}/sendMessage"
                headers:
                  Content-Type: application/json
                layout:
                  chat_id: "128627881"
                  text: "⚠️ {{ "{{" }}.Reason{{ "}}" }}: {{ "{{" }}.InvolvedObject.Namespace{{ "}}" }}/{{ "{{" }}.InvolvedObject.Name{{ "}}" }}\n{{ "{{" }}.Message{{ "}}" }}"
  data:
    - secretKey: telegramToken
      remoteRef:
        key: "CasaBot (Telegram)"
        property: credential
