defaultPodOptions:
  hostNetwork: true
  # Update to correct Talos worker node that has the USB serial dongle
  nodeSelector:
    kubernetes.io/hostname: "worker-01"
  tolerations:
    - key: CriticalAddonsOnly
      operator: "Exists"

controllers:
  main:
    replicas: 1
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/jippi/docker-ser2net
          tag: 4.6.4

service:
  main:
    controller: main
    ports:
      http:
        port: 20108

persistence:
  config:
    type: configMap
    name: ser2net-config
    globalMounts:
      - path: /etc/ser2net/ser2net.yaml
        subPath: ser2net.yaml
        readOnly: true
  usb:
    enabled: true
    type: hostPath
    hostPath: &usbdevice /dev/serial/by-id/usb-ITEAD_SONOFF_Zigbee_3.0_USB_Dongle_Plus_V2_20231219170448-if00
    hostPathType: CharDevice
    globalMounts:
      - path: *usbdevice

resources:
  requests:
    cpu: 5m
    memory: 10Mi
  limits:
    memory: 256Mi
