controller:
  type: statefulset

image:
  repository: ghcr.io/home-assistant/home-assistant
  tag: 2026.6.1

env:
  TZ: "Europe/London"

hostNetwork: true

service:
  main:
    ports:
      http:
        port: 8123
      homekit:
        port: 21063

ingress:
  main:
    enabled: true
    annotations:
      kubernetes.io/tls-acme: "true"
    hosts:
      - host: homeassistant.homelab.arsenikki.casa
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: home-assistant-tls
        hosts:
          - homeassistant.homelab.arsenikki.casa

persistence:
  config:
    enabled: true
    type: pvc
    existingClaim: home-assistant-config
  configuration-yaml:
    enabled: true
    type: configMap
    name: home-assistant-config-yaml
    mountPath: /config/configuration.yaml
    subPath: configuration.yaml
    readOnly: true
  adaptive-lighting-config:
    enabled: true
    type: configMap
    name: home-assistant-config-yaml
    mountPath: /config/adaptive_lighting_config.yaml
    subPath: adaptive_lighting_config.yaml
    readOnly: true

resources:
  requests:
    cpu: 10m
    memory: 100Mi
  limits:
    memory: 2000Mi

addons:
  codeserver:
    enabled: true
    image:
      repository: ghcr.io/coder/code-server
      tag: 4.95.3
      pullPolicy: IfNotPresent
    env:
      TZ: "Europe/London"
    args:
      - --auth
      - "none"
      - --user-data-dir
      - "/config/.vscode"
      - --extensions-dir
      - "/config/.vscode"
    volumeMounts:
      - name: config
        mountPath: /config
    ingress:
      enabled: true
      annotations:
        kubernetes.io/tls-acme: "true"
        traefik.ingress.kubernetes.io/router.middlewares: "authentik-forward-auth@kubernetescrd"
        external-dns/is-public: "true"
      hosts:
        - host: "code.homeassistant.homelab.arsenikki.casa"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: home-assistant-vscode-tls
          hosts:
            - "code.homeassistant.homelab.arsenikki.casa"
