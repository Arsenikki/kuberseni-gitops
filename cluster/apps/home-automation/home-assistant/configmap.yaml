---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-config-yaml
  namespace: home-automation
data:
  configuration.yaml: |
    # Loads default set of integrations. Do not remove.
    default_config:

    # Enable rest api for Temporal.io usage
    api:

    # Enable WoL integration
    wake_on_lan:

    # Configure reverse proxy
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.244.0.0/16
        - 10.96.0.0/12
        - 192.168.1.0/24

    # Enable homekit integration
    homekit:
      - name: virtual_bridge
        filter:
          include_domains:
            - light
            - switch
          exclude_entity_globs:
            - switch.adaptive_lighting_adapt_*
            - switch.*_do_not_disturb
      - name: virtual_accessories
        port: 21065
        filter:
          include_domains:
            - media_player
        entity_config:
          media_player.living_room_tv:
            feature_list:
              - feature: on_off
              - feature: play_pause
              - feature: play_stop
              - feature: toggle_mute

    light:
    # Configure specified switches to report as lights
      - platform: switch
        name: kitchen_countertop_lights
        entity_id: switch.kitchen_countertop_lights
      - platform: switch
        name: living_room_christmas_lights
        entity_id: switch.living_room_christmas_lights

    # Group lights into single entities
      - platform: group
        name: "kitchen_all_lights"
        entities:
          - light.kitchen_countertop_lights
          - light.kitchen_led_strip_01
          - light.kitchen_led_strip_02
      - platform: group
        name: "living_room_all_lights"
        entities:
          - light.living_room_christmas_lights
          - light.living_room_corner_light_01
          - light.living_room_corner_light_02
      - platform: group
        name: "lobby_all_lights"
        entities:
          - light.lobby_candle_light_01
          - light.lobby_candle_light_02
          - light.lobby_candle_light_03

    # Configure selectors
    input_select:
      adaptive_lighting_level:
        options:
          - low
          - medium
          - high
          - maximum
        initial: medium
      scene:
        options:
          - normal
          - away
          - cleaning
          - spinning
        initial: normal
      bathroom_mood_light_mode:
        options:
          - cold
          - warm
          - hot
          - violet

    # Homelab infra reachability checks (up/down). Internal svc URLs bypass
    # Authentik; LAN hosts use verify_ssl:false for self-signed certs.
    binary_sensor:
      - platform: rest
        name: "ArgoCD"
        unique_id: infra_argocd
        resource: "http://argocd-server.argocd.svc/healthz"
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "Authentik"
        unique_id: infra_authentik
        resource: "http://authentik-server.authentik.svc/-/health/live/"
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "Longhorn"
        unique_id: infra_longhorn
        resource: "http://longhorn-frontend.longhorn-system.svc/"
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "Plex Server"
        unique_id: infra_plex
        resource: "http://plex.media.svc.cluster.local:32400/identity"
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "OPNSense"
        unique_id: infra_opnsense
        resource: "https://192.168.1.1"
        verify_ssl: false
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "TrueNAS"
        unique_id: infra_truenas
        resource: "https://192.168.1.2"
        verify_ssl: false
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "Proxmox Router"
        unique_id: infra_proxmox_router
        resource: "https://192.168.1.10:8006"
        verify_ssl: false
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "Proxmox MiniPC"
        unique_id: infra_proxmox_minipc
        resource: "https://192.168.1.11:8006"
        verify_ssl: false
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60
      - platform: rest
        name: "Proxmox NAS"
        unique_id: infra_proxmox_nas
        resource: "https://192.168.1.12:8006"
        verify_ssl: false
        device_class: connectivity
        value_template: "{{ true }}"
        timeout: 10
        scan_interval: 60

    # ArgoCD applications (read-only) for the dashboard apps table.
    # Token injected via ARGOCD_BEARER env (ESO -> argocd-dashboard secret).
    # fields= keeps the payload small enough for an HA attribute.
    rest:
      - resource: "http://argocd-server.argocd.svc/api/v1/applications?fields=items.metadata.name,items.status.sync.status,items.status.health.status"
        headers:
          Authorization: !env_var ARGOCD_BEARER
        scan_interval: 60
        timeout: 15
        sensor:
          - name: "ArgoCD Apps"
            unique_id: argocd_apps
            value_template: "{{ value_json.items | length if value_json else 0 }}"
            unit_of_measurement: "apps"
            json_attributes:
              - items

    # Import other configs
    adaptive_lighting: !include adaptive_lighting_config.yaml
    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml

  automations.yaml: "[]"
  scenes.yaml: "[]"
  scripts.yaml: "{}"

  adaptive_lighting_config.yaml: |
    - name: "Low"
      lights: &lights [
        light.kitchen_led_strip_01,
        light.kitchen_led_strip_02,
        light.living_room_corner_light_01,
        light.living_room_corner_light_02,
        light.lobby_candle_light_01,
        light.lobby_candle_light_02,
        light.lobby_candle_light_03
      ]
      prefer_rgb_color: false
      transition: 45
      initial_transition: 1
      interval: 90
      min_brightness: 1
      max_brightness: 10
      min_color_temp: 2500
      max_color_temp: 3000
      sleep_brightness: 1
      sleep_color_temp: 1000
      take_over_control: false
      detect_non_ha_changes: true
      adapt_only_on_bare_turn_on: true

    - name: "Medium"
      lights: *lights
      prefer_rgb_color: false
      transition: 45
      initial_transition: 1
      interval: 90
      min_brightness: 5
      max_brightness: 40
      min_color_temp: 2500
      max_color_temp: 4000
      sleep_brightness: 1
      sleep_color_temp: 1000
      take_over_control: false
      detect_non_ha_changes: true
      adapt_only_on_bare_turn_on: true

    - name: "High"
      lights: *lights
      prefer_rgb_color: false
      transition: 45
      initial_transition: 1
      interval: 90
      min_brightness: 10
      max_brightness: 80
      min_color_temp: 2500
      max_color_temp: 5000
      sleep_brightness: 1
      sleep_color_temp: 1000
      take_over_control: false
      detect_non_ha_changes: true
      adapt_only_on_bare_turn_on: true

    - name: "Maximum"
      lights: *lights
      prefer_rgb_color: false
      transition: 45
      initial_transition: 1
      interval: 90
      min_brightness: 20
      max_brightness: 100
      min_color_temp: 2500
      max_color_temp: 5000
      sleep_brightness: 1
      sleep_color_temp: 1000
      take_over_control: false
      detect_non_ha_changes: true
      adapt_only_on_bare_turn_on: true
