controllers:
  main:
    containers:
      app:
        image:
          repository: docker.n8n.io/n8nio/n8n
          tag: 1.114.2
        env:
          N8N_HOST: "n8n.arsenikki.casa"
          N8N_PORT: "5678"
          N8N_PROTOCOL: "https"
          WEBHOOK_URL: "https://n8n.arsenikki.casa/"
          TZ: "Europe/London"
          GENERIC_TIMEZONE: "Europe/London"
          N8N_TEMPLATES_ENABLED: true
          N8N_RUNNERS_ENABLED: true
        resources:
          requests:
            cpu: 300m
            memory: 512M
          limits:
            memory: 1024M
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

service:
  main:
    controller: main
    ports:
      http:
        port: 5678

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/tls-acme: "true"
      traefik.ingress.kubernetes.io/router.middlewares: "forward-auth@kubernetescrd"
    hosts:
      - host: n8n.arsenikki.casa
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - secretName: n8n-tls
        hosts:
          - n8n.arsenikki.casa

persistence:
  config:
    enabled: true
    existingClaim: n8n-config
    globalMounts:
      - path: /home/node/.n8n
