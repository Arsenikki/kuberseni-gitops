controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/paperless-ngx/paperless-ngx
          tag: 2.7.2
        env:
          PAPERLESS_CONSUMER_POLLING: 5
          PAPERLESS_CONSUMER_RECURSIVE: "true"
          PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
          PAPERLESS_DATA_DIR: /library/data
          PAPERLESS_MEDIA_ROOT: /library/media
          PAPERLESS_CONSUMPTION_DIR: /library/consume
          PAPERLESS_EXPORT_DIR: /library/export
          PAPERLESS_ENABLE_HTTP_REMOTE_USER: "true"
          PAPERLESS_OCR_LANGUAGE: eng
          PAPERLESS_PORT: 8000
          PAPERLESS_TIME_ZONE: Europe/London
          PAPERLESS_URL: "https://paperless.arsenikki.casa"
          PAPERLESS_REDIS: redis://paperless-ngx-redis-master:6379
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsgroup: 1000
          fsGroupChangePolicy: "OnRootMismatch"

service:
  main:
    ports:
      http:
        port: 8000

ingress:
  main:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/tls-acme: "true"
      traefik.ingress.kubernetes.io/router.middlewares: "forward-auth@kubernetescrd"
    hosts:
      - host: "paperless.arsenikki.casa"
        paths:
          - path: /
            pathType: Prefix
            service:
              name: main
              port: http
    tls:
      - hosts:
          - "paperless.arsenikki.casa"

persistence:
  library:
    enabled: true
    existingClaim: paperless-ngx-nfs
