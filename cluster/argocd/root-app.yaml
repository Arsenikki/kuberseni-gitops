---
# Root Application — discovers all Application objects from cluster/argocd/
# Apply manually after bootstrap:
#   kubectl apply -f cluster/argocd/root-app.yaml
#
# Application definitions live in cluster/argocd/apps/ (flat list).
# Config data (Helm values, manifests) lives in cluster/apps/ alongside
# argocd-app.yaml which serves as human-readable co-located reference.
# When adding a new app: update cluster/argocd/apps/<name>.yaml and
# mirror the argocd-app.yaml in the app config directory.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  source:
    repoURL: https://github.com/Arsenikki/kuberseni-gitops
    targetRevision: feat/talos
    path: cluster/argocd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
