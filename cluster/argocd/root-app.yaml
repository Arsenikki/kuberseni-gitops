---
# Root Application — watches cluster/apps for all argocd-app.yaml files.
# Apply this manually once after bootstrapping ArgoCD:
#   kubectl apply -f cluster/argocd/projects/kuberseni.yaml
#   kubectl apply -f cluster/argocd/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  source:
    repoURL: https://github.com/Arsenikki/kuberseni-gitops
    targetRevision: feat/talos
    path: cluster/apps
    directory:
      recurse: true
      include: "argocd-app.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
