---
# ServiceMonitors for already-instrumented apps + seed PrometheusRules. Wave 6 — after
# the Prometheus Operator CRDs (wave 1) AND the target workloads/Alloy (wave 5) exist.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  source:
    repoURL: https://github.com/Arsenikki/kuberseni-gitops
    targetRevision: main
    path: cluster/apps/monitoring/observability
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
