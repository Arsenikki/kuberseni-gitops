---
# In-cluster S3 object store. Backs Mimir blocks/ruler/alertmanager + Loki chunks.
# Wave 2 (storage) — must be Healthy before Mimir/Loki (wave 5).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  sources:
    - repoURL: https://seaweedfs.github.io/seaweedfs/helm
      chart: seaweedfs
      targetRevision: 4.36.0
      helm:
        valueFiles:
          - $values/cluster/apps/monitoring/seaweedfs/values.yaml
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: main
      path: cluster/apps/monitoring/seaweedfs
      directory:
        exclude: "values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
