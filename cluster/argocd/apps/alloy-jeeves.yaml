---
# Dedicated Grafana Alloy OTLP gateway for Jeeves (Claude Code) telemetry.
# ClusterIP-only ingest that fans OTLP out to Tempo/Loki/Mimir. Ships alongside the
# chart: a CiliumNetworkPolicy (lock ingress to jeeves-prod/dev) + a PrometheusRule.
# Wave 6 — after the backends (Tempo/Loki/Mimir wave 5) and the operator CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-jeeves
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.10.1
      helm:
        valueFiles:
          - $values/cluster/apps/monitoring/alloy-jeeves/values.yaml
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: main
      path: cluster/apps/monitoring/alloy-jeeves
      directory:
        exclude: "values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
