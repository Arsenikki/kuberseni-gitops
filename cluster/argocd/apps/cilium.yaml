---
# Cilium is bootstrapped manually via Helm before ArgoCD runs.
# This Application adopts the existing release and manages it going forward.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  sources:
    - repoURL: https://helm.cilium.io
      chart: cilium
      # Rolled back from 1.19.4 — the upgrade broke cross-node routing on CP-01
      # (different L2 bridge vmbr2 vs vmbr0). Investigate before re-upgrading.
      targetRevision: 1.17.2
      helm:
        valueFiles:
          - $values/cluster/apps/cilium/values.yaml
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: feat/talos
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
