---
# Deploys all per-app ExternalSecrets. Each file has its own namespace: metadata
# so resources land in the correct namespace regardless of the destination here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-externalsecrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  source:
    repoURL: https://github.com/Arsenikki/kuberseni-gitops
    targetRevision: feat/talos
    path: cluster/app-externalsecrets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
