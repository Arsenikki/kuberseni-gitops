---
# Grafana Mimir — long-term, S3-backed Prometheus TSDB. Receives remote_write from
# Alloy; evaluates ruler rules (synced from PrometheusRule CRDs by Alloy); routes
# alerts via its bundled Alertmanager to Telegram/CasaBot.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: mimir-distributed
      targetRevision: 6.1.0
      helm:
        valueFiles:
          - $values/cluster/apps/monitoring/mimir/values.yaml
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Arsenikki/kuberseni-gitops
      targetRevision: main
      path: cluster/apps/monitoring/mimir
      directory:
        exclude: "values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
