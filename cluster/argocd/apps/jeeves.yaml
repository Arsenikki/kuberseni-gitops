---
# jeeves — ticket-driven autonomous maintenance system (GitHub Issues -> reviewed
# PRs, built with Paseo + Claude Code). Source lives in a SEPARATE (private) repo;
# rendered with kustomize (path "deploy/overlays/prod"). Wave 6 — after
# ESO/1Password (secrets) and Longhorn (NATS + Paseo PVCs).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jeeves
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    # The source repo is PRIVATE, so the in-CI "Render ArgoCD diff" preview (an
    # ephemeral ArgoCD with no repo creds) cannot list its refs and fails the
    # check. Skip this app in the preview; the live cluster's ArgoCD has the
    # repo credential (jeeves-repo ExternalSecret) and renders it normally.
    argocd-diff-preview/ignore: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: kuberseni
  source:
    repoURL: https://github.com/Arsenikki/jeeves
    targetRevision: main
    path: deploy/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    # Prod moved to its own namespace (symmetric with jeeves-dev). The matching
    # jeeves-repo change renames the prod overlay namespace; ArgoCD migrates the
    # workloads jeeves -> jeeves-prod (tears down the old namespace, NATS+daemon
    # state reset — done with prod idle).
    namespace: jeeves-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
