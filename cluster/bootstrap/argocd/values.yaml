---
global:
  domain: argocd.arsenikki.casa

configs:
  params:
    server.insecure: false
  cm:
    admin.enabled: true
    # Allow ArgoCD to manage itself (app-of-apps)
    application.resourceTrackingMethod: annotation
    # Poll git every 60 seconds (default is 3 minutes)
    timeout.reconciliation: 60s

server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/tls-acme: "true"
      external-dns/is-public: "true"
    hosts:
      - argocd.arsenikki.casa
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.arsenikki.casa
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists

notifications:
  enabled: true
  argocdUrl: https://argocd.arsenikki.casa
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
  cm:
    create: true
  secret:
    create: true
    items: {}
  notifiers:
    "service.webhook.ntfy": |
      url: http://ntfy.home-automation.svc.cluster.local
      headers:
        - name: Content-Type
          value: application/json
  templates:
    "template.app-sync-succeeded": |
      webhook:
        ntfy:
          method: POST
          path: /
          body: |
            {
              "topic": "argocd",
              "title": "Synced: {{.app.metadata.name}}",
              "message": "{{.app.metadata.name}} synced successfully.",
              "tags": ["white_check_mark"],
              "priority": 2
            }
    "template.app-sync-failed": |
      webhook:
        ntfy:
          method: POST
          path: /
          body: |
            {
              "topic": "argocd",
              "title": "Sync Failed: {{.app.metadata.name}}",
              "message": "{{.app.metadata.name}} sync failed.\n\n{{.app.status.operationState.message}}",
              "tags": ["x"],
              "priority": 4
            }
    "template.app-health-degraded": |
      webhook:
        ntfy:
          method: POST
          path: /
          body: |
            {
              "topic": "argocd",
              "title": "Degraded: {{.app.metadata.name}}",
              "message": "{{.app.metadata.name}} health is Degraded.",
              "tags": ["warning"],
              "priority": 4
            }
  triggers:
    "trigger.on-sync-succeeded": |
      - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
        send: [app-sync-succeeded]
    "trigger.on-sync-failed": |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    "trigger.on-health-degraded": |
      - when: app.status.health.status == 'Degraded'
        send: [app-health-degraded]
  subscriptions:
    - recipients:
        - webhook:ntfy
      triggers:
        - on-sync-failed
        - on-health-degraded

# Run ArgoCD components on control-plane nodes
controller:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists

repoServer:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists

redis:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
