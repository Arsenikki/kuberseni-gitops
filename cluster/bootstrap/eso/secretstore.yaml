---
# 1Password Connect ClusterSecretStore
# Requires 1Password Connect server + token secret to already exist.
# Bootstrap: kubectl create secret generic onepassword-connect-token \
#   -n external-secrets --from-literal=token=<YOUR_CONNECT_TOKEN>
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.external-secrets.svc.cluster.local:8080
      vaults:
        homelab: 1
      auth:
        secretRef:
          connectTokenSecretRef:
            name: onepassword-connect-token
            namespace: external-secrets
            key: token
