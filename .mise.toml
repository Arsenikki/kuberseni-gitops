# mise configuration for kuberseni-gitops project
# Run `mise install` to install all tools

[tools]
# Talos tooling
talhelper = "3.1.10"
talosctl = "1.13.4"

# Configuration management
sops = "3.13.1"
age = "1.3.1"

# Infrastructure as Code
opentofu = "1.11.5"

# Utilities
yq = "4.53.3"
task = "3.51.1"
pre-commit = "4.2.0"

# Python tooling — provides `uvx` for running MCP servers (e.g. ha-mcp)
uv = "0.11.21"
