# mise configuration for kuberseni-gitops project
# Run `mise install` to install all tools

[tools]
# Talos tooling
talhelper = "3.1.13"
talosctl = "1.13.6"

# Configuration management
sops = "3.13.2"
age = "1.3.1"

# Infrastructure as Code
opentofu = "1.12.2"

# Utilities
yq = "4.53.3"
task = "3.52.0"
pre-commit = "4.6.0"

# Python tooling — provides `uvx` for running MCP servers (e.g. ha-mcp)
uv = "0.11.21"
