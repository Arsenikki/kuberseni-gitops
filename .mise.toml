# mise configuration for kuberseni-gitops project
# Run `mise install` to install all tools

[tools]
# Talos tooling
talhelper = "3.1.10"
talosctl = "latest"

# Configuration management
sops = "latest"
age = "latest"

# Infrastructure as Code
opentofu = "1.11.5"

# Utilities
yq = "latest"
task = "latest"
prek = "latest"

# Python tooling — provides `uvx` for running MCP servers (e.g. ha-mcp)
uv = "0.11.21"
