# prek configuration for kuberseni-gitops
# https://github.com/j178/prek

[[tool.prek.repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
    # General file checks
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-merge-conflict" },
    { id = "check-case-conflict" },
    { id = "mixed-line-ending" },
    
    # YAML checks
    { id = "check-yaml", args = ["--unsafe"] },  # --unsafe allows custom tags (like SOPS)
    { id = "sort-simple-yaml" },
    
    # Large files
    { id = "check-added-large-files", args = ["--maxkb=1024"] },
]

[[tool.prek.repos]]
repo = "https://github.com/google/yamlfmt"
rev = "v0.17.0"
hooks = [
    { id = "yamlfmt", files = "\\.(yaml|yml)$", exclude = "(secrets\\.tfvars|talsecret\\.yaml|\\.sops\\.yaml|mise\\.lock)" },
]

[[tool.prek.repos]]
repo = "https://github.com/antonbabenko/pre-commit-terraform"
rev = "v2.3.3"
hooks = [
    { id = "terraform_fmt" },
    { id = "terraform_validate", args = ["--hook-config=--retry-once-with-cleanup=true"] },
    { id = "terraform_tflint" },
]

[[tool.prek.repos]]
repo = "local"
hooks = [
    # OpenTofu formatting (use our project-local opentofu)
    { 
        id = "tofu-fmt",
        name = "OpenTofu fmt",
        entry = "tofu",
        args = ["fmt", "-recursive"],
        language = "system",
        files = "\\.tf$",
        pass_filenames = false,
    },
]
